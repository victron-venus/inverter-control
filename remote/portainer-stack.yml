# Portainer Stack for Inverter Dashboard
# 
# Deploy in Portainer:
# 1. Go to Stacks -> Add stack
# 2. Name: inverter-dashboard
# 3. Build method: Web editor
# 4. Paste this content
# 5. Set environment variables:
#    - MQTT_HOST: Cerbo IP (default: 192.168.160.150)
#    - MQTT_PORT: 1883
# 6. Deploy

version: "3.8"

services:
  dashboard:
    image: ghcr.io/victron-venus/inverter-dashboard:latest
    container_name: inverter-dashboard
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - MQTT_HOST=${MQTT_HOST:-192.168.160.150}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - WEB_PORT=8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/state')"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.inverter.rule=Host(`inverter.local`)"
      - "traefik.http.services.inverter.loadbalancer.server.port=8080"
