version: "3.8"

services:
  inverter-dashboard:
    build: .
    image: inverter-dashboard:latest
    container_name: inverter-dashboard
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - MQTT_HOST=${MQTT_HOST:-192.168.160.150}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - WEB_PORT=8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/state')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Optional: Mosquitto MQTT broker if not using Cerbo's built-in
  # mqtt:
